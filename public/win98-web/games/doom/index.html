<!doctype html>
<html lang="en-us">
    <head>
        <meta charset="utf-8">
        <title>Doom</title>
        <style>
            html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
            canvas { width: 100%; height: 100%; display: block; border: 0 none; outline: none; }
        </style>
    </head>
    <body>
        <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
        <script>
            var Module = {
                canvas: document.getElementById('canvas'),
                noInitialRun: true,
                locateFile: function(path) {
                    if (path.endsWith('.wasm')) return 'websockets-doom.wasm';
                    return path;
                },
                onRuntimeInitialized: function() {
                    console.log("Doom runtime initialized in iframe");
                    window.parent.postMessage({ type: 'DOOM_READY' }, '*');
                },
                onExit: function() {
                    window.parent.postMessage({ type: 'DOOM_EXIT' }, '*');
                }
            };
        </script>
        <script src="websockets-doom.js"></script>
    </body>
</html>
